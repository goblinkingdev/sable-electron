name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      draft:
        description: "Create as draft release"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            targets: "--linux"
            artifact: "linux"
          - os: windows-2022
            targets: "--win"
            artifact: "windows"
          - os: macos-14
            targets: "--mac"
            artifact: "macos"

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.artifact }})

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Setup pnpm (for Sable submodule)
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Install Sable deps
        working-directory: sable
        run: pnpm install --frozen-lockfile

      - name: Build Sable
        working-directory: sable
        env:
          SENTRY_AUTH_TOKEN: ""
          SENTRY_ORG: ""
          SENTRY_PROJECT: ""
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: pnpm build

      - name: Install wrapper deps
        run: npm ci

      - name: Compile TypeScript
        run: npm run build:electron

      - name: Import macOS certs
        if: runner.os == 'macOS' && env.APPLE_CERT_BASE64 != ''
        env:
          APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          echo "$APPLE_CERT_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Package with electron-builder
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder ${{ matrix.targets }} --publish never

      - name: Assemble Arch Linux binary tarball
        if: runner.os == 'Linux'
        run: |
          mkdir -p arch-pkg/usr/bin
          cp -ar dist-electron arch-pkg/usr/lib/sable-desktop/
          cp -ar node_modules arch-pkg/usr/lib/sable-desktop/
          cp -ar resources arch-pkg/usr/lib/sable-desktop/
          cp -a sable/dist arch-pkg/usr/lib/sable-desktop/
          cp package.json arch-pkg/usr/lib/sable-desktop/
          cat > arch-pkg/usr/bin/sable-desktop << 'SHEOF'
          #!/bin/sh
          exec /usr/bin/electron /usr/lib/sable-desktop "$@"
          SHEOF
          chmod 755 arch-pkg/usr/bin/sable-desktop
          install -Dm644 resources/logo.svg \
            arch-pkg/usr/share/icons/hicolor/scalable/apps/sable-desktop.svg
          install -Dm644 resources/icons/256x256.png \
            arch-pkg/usr/share/icons/hicolor/256x256/apps/sable-desktop.png
          install -Dm644 resources/icons/48x48.png \
            arch-pkg/usr/share/icons/hicolor/48x48/apps/sable-desktop.png
          install -Dm644 /dev/stdin \
            arch-pkg/usr/share/applications/sable-desktop.desktop << 'DESKTOPFILE'
          [Desktop Entry]
          Name=Sable Desktop
          Comment=Unofficial Electron desktop wrapper for Sable Matrix client
          Exec=/usr/bin/sable-desktop
          Icon=sable-desktop
          Terminal=false
          Type=Application
          Categories=Network;InstantMessaging;Chat;
          StartupWMClass=Sable
          MimeType=x-scheme-handler/matrix;
          DESKTOPFILE
          cp LICENSE arch-pkg/usr/share/licenses/sable-desktop/
          cd arch-pkg && tar czf "../sable-desktop-archlinux-${GITHUB_REF_NAME#v}.tar.gz" .

      - name: Upload Arch Linux tarball
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: sable-desktop-archlinux
          path: sable-desktop-archlinux-*.tar.gz

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sable-desktop-${{ matrix.artifact }}
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.exe
            dist/*.dmg
            dist/*.zip
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: false

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: ${{ github.event.inputs.draft == 'true' }}
          generate_release_notes: true
          files: artifacts/**/*
          body: |
            ## Sable Desktop ${{ github.ref_name }}

            Unofficial Electron wrapper for [Sable](https://github.com/SableClient/Sable) Matrix client.

            ### Downloads
            | Platform | File |
            |----------|------|
            | Linux (x64) | `.AppImage`, `.deb`, `.rpm`, `.tar.gz` (Arch Linux) |
            | Windows (x64) | `.exe` (NSIS installer) |
            | macOS (Universal) | `.dmg` |

            > **Note:** macOS builds are unsigned
            > You may need to right-click → Open the first time.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
